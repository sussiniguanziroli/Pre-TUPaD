<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Food Store — Iniciar sesión</title>
  <link rel="stylesheet" href="../../../css/main.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <h1>🍔 Food Store</h1>
      <h2>Iniciar Sesión</h2>
      <div id="alert-box"></div>
      <form id="login-form">
        <div class="field">
          <label for="mail">Email</label>
          <input id="mail" name="mail" type="email" placeholder="ejemplo@correo.com" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="Ingresá tu contraseña" required />
        </div>
        <button type="submit" class="btn">Ingresar</button>
      </form>
      <p class="switch-link">¿No tenés cuenta? <a href="../register/register.html">Registrate</a></p>
      <div class="credenciales-demo">
        <strong>Credenciales de prueba</strong><br />
        Admin: admin@admin.com / 123456<br />
        Cliente: cliente@food.com / cliente123
      </div>
    </div>
  </div>
  <script type="module" src="./login.ts"></script>
</body>
</html>
