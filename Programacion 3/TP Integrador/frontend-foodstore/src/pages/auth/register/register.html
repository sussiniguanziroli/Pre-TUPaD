<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Food Store — Registro</title>
  <link rel="stylesheet" href="../../../css/main.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <h1>🍔 Food Store</h1>
      <h2>Registro</h2>
      <div id="alert-box"></div>
      <form id="register-form">
        <div class="field">
          <label for="nombre">Nombre completo</label>
          <input id="nombre" name="nombre" type="text" placeholder="Ingresá tu nombre completo" required />
        </div>
        <div class="field">
          <label for="mail">Email</label>
          <input id="mail" name="mail" type="email" placeholder="ejemplo@correo.com" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="Mínimo 6 caracteres" required minlength="6" />
        </div>
        <button type="submit" class="btn">Registrarme</button>
      </form>
      <p class="switch-link">¿Ya tenés cuenta? <a href="../login/login.html">Iniciar sesión</a></p>
    </div>
  </div>
  <script type="module" src="./register.ts"></script>
</body>
</html>
