<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Food Store — Mi Carrito</title>
  <link rel="stylesheet" href="../../../css/main.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <h1>Mi Carrito</h1>
    <div class="cart-layout">
      <div id="cart-container"></div>
      <div class="summary-card">
        <h3>Resumen del Pedido</h3>
        <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal">$0.00</span></div>
        <div class="summary-row"><span>Envío</span><span id="sum-envio">$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="sum-total">$0.00</span></div>
        <button id="btn-checkout" class="btn">Proceder al Pago</button>
        <button id="btn-clear" class="btn btn-secondary btn-block">Vaciar Carrito</button>
      </div>
    </div>
  </main>
  <div id="modal-root"></div>
  <script type="module" src="./cart.ts"></script>
</body>
</html>
